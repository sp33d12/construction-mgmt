databases:
  - name: construction-db
    databaseName: construction_mgmt
    user: construction_user
    plan: free

services:
  - type: web
    name: construction-mgmt
    runtime: node
    plan: free
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm install
    startCommand: node backend/src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: construction-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
