version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-construction}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepass123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-construction}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-securepass123}@db:5432/${DB_NAME:-construction}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-use-long-random-string}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD:-securepass123}
      DB_HOST: db
      DB_USER: ${DB_USER:-admin}
      DB_NAME: ${DB_NAME:-construction}
    volumes:
      - ./backups:/backups
    entrypoint: [
      "sh", "-c",
      "while true; do sleep 86400 && pg_dump -h $$DB_HOST -U $$DB_USER $$DB_NAME > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql && find /backups -name '*.sql' -mtime +7 -delete; done"
    ]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
